name: CD (Deploy to Cloud Run)

on:
  push:
    branches:
      - main

env:
  REGION: asia-northeast1
  REPO_NAME: engineer-quest-repo

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # =========================
      # Backend
      # =========================
      - name: Build and Push Back
        run: |
          BACK_BUILD_ID=$(gcloud builds submit ./back \
            --tag "${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${REPO_NAME}/back:latest" \
            --async \
            --format="value(metadata.build.id)")
          echo "BACK_BUILD_ID=$BACK_BUILD_ID" >> $GITHUB_ENV
          echo "Back build id: $BACK_BUILD_ID"

      - name: Wait for Back Build
        run: |
          while true; do
            STATUS=$(gcloud builds describe "$BACK_BUILD_ID" --format="value(status)")
            echo "Current back build status: $STATUS"

            if [ "$STATUS" = "SUCCESS" ]; then
              echo "Back build succeeded"
              break
            elif [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "CANCELLED" ] || [ "$STATUS" = "TIMEOUT" ]; then
              echo "Back build failed with status: $STATUS"
              exit 1
            fi

            sleep 10
          done

      - name: Deploy Backend
        run: |
          gcloud run deploy engineer-quest-back-prod \
            --image "${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${REPO_NAME}/back:latest" \
            --region "${REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "NODE_ENV=production,ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest"

      # =========================
      # Frontend
      # =========================
      - name: Build and Push Front
        run: |
          FRONT_BUILD_ID=$(gcloud builds submit ./front \
            --config ./front/cloudbuild.yaml \
            --async \
            --substitutions "_NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}" \
            --format="value(metadata.build.id)")
          echo "FRONT_BUILD_ID=$FRONT_BUILD_ID" >> $GITHUB_ENV
          echo "Front build id: $FRONT_BUILD_ID"

      - name: Wait for Front Build
        run: |
          while true; do
            STATUS=$(gcloud builds describe "$FRONT_BUILD_ID" --format="value(status)")
            echo "Current front build status: $STATUS"

            if [ "$STATUS" = "SUCCESS" ]; then
              echo "Front build succeeded"
              break
            elif [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "CANCELLED" ] || [ "$STATUS" = "TIMEOUT" ]; then
              echo "Front build failed with status: $STATUS"
              exit 1
            fi

            sleep 10
          done

      - name: Deploy Front
        run: |
          gcloud run deploy engineer-quest-front-prod \
            --image "${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${REPO_NAME}/front:latest" \
            --region "${REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }},NODE_ENV=production"