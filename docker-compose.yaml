services:
  front:
    build:
      context: ./front
      dockerfile: Dockerfile.dev
    container_name: engineer-quest-front
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      NODE_ENV: development
      PORT: 3000
    volumes:
      - ./front:/app
      - /app/node_modules
    depends_on:
      - back
  
  back:
    build:
      context: ./back
      dockerfile: Dockerfile.dev
    container_name: engineer-quest-back
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL}
      ALLOWED_ORIGINS: http://localhost:3000
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS}
    volumes:
      - ./back:/app
      - /app/node_modules